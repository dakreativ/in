<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portwish Admin - System Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>tailwind.config = { theme: { extend: { colors: { cream: { 50: '#FCFAF8', 100: '#F7F4ED' } } } } }</script>
    <style>
        :root { --primary: #000000; --bg: #FCFAF8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #000; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; } .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .input-box { width: 100%; border: 2px solid #e7e5e4; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; transition: all 0.3s ease; outline: none; background: #fff; }
        .input-box:focus { border-color: #000; }
    </style>
</head>
<body class="flex h-screen overflow-hidden selection:bg-black selection:text-white">

    <!-- ADMIN TOAST -->
    <div id="adminToast" class="fixed top-10 left-1/2 transform -translate-x-1/2 z-[1000] transition-all duration-500 translate-y-[-150%] opacity-0 pointer-events-none w-max max-w-[90vw]">
        <div class="bg-black/95 backdrop-blur-md text-white text-[11px] font-bold px-5 py-3 rounded-full shadow-2xl flex items-center space-x-2 border border-stone-700">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
            <span id="adminToastMsg">Success</span>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside class="w-64 bg-white border-r border-stone-200 flex flex-col justify-between hidden md:flex z-20">
        <div>
            <div class="h-20 flex items-center px-8 border-b border-stone-100">
                <img src="https://res.cloudinary.com/dvtgxw9jj/image/upload/v1777637480/IMG_9379_spswky.png" alt="Portwish" class="h-7">
            </div>
            <nav class="p-4 space-y-2">
                <!-- Cukup tab order untuk testing admin update logistik -->
                <button onclick="switchTab('orders')" id="nav-orders" class="nav-btn w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-black text-white font-bold text-sm transition-all shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                    <span>Pesanan & Resi</span>
                </button>
            </nav>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-cream-50 relative">
        <header class="h-20 bg-white/90 backdrop-blur-md border-b border-stone-200 sticky top-0 z-10 flex items-center px-8">
            <h2 class="text-xl font-extrabold tracking-tight" id="headerTitle">Manajemen Pesanan</h2>
        </header>

        <div class="p-8">
            <div id="ordersTab" class="tab-content active">
                <div class="bg-white rounded-[24px] border border-stone-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-stone-50 text-[10px] uppercase tracking-widest text-stone-500 border-b border-stone-200">
                                    <th class="p-4 font-extrabold">Order ID</th>
                                    <th class="p-4 font-extrabold">Pelanggan</th>
                                    <th class="p-4 font-extrabold w-1/3">Status & Tracking Logistik (Manual)</th>
                                </tr>
                            </thead>
                            <tbody id="orderTableBody" class="text-sm">
                                <!-- Render via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let ordersDB = [
            {
                id: 'INV-773821', date: '1 Mei 2026', user: {name: "Dadan Furman", phone: "081234"}, 
                status: 'Sedang Dikirim', resi: 'LP987654321', 
                latestTracking: "Paket telah diterima di fasilitas transit utama Jakarta Pusat.",
                trackingTime: "2 Mei 2026, 14:00 WIB"
            }
        ];

        function showAdminToast(msg) {
            const toast = document.getElementById('adminToast');
            document.getElementById('adminToastMsg').textContent = msg;
            toast.classList.remove('translate-y-[-150%]', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-[-150%]', 'opacity-0'); }, 3000);
        }

        function renderOrders() {
            const tbody = document.getElementById('orderTableBody');
            tbody.innerHTML = '';

            ordersDB.forEach((o, index) => {
                let badgeClass = o.status === "Sedang Dikirim" ? "bg-black text-white border-black" : "bg-orange-100 text-orange-700";
                
                // PANEL TRACKING WIZARD OF OZ (Hanya muncul jika sudah ada resi/dikirim)
                let trackingPanel = ``;
                if(o.status === "Sedang Dikirim") {
                    trackingPanel = `
                        <div class="mt-3 p-3 bg-cream-50 rounded-xl border border-stone-200">
                            <p class="text-[9px] font-extrabold text-stone-500 uppercase tracking-widest mb-1.5">Admin: Update Tracker Palsu</p>
                            <div class="flex items-center space-x-2">
                                <input type="text" id="manualTrack_${index}" placeholder="Ketik status terkini paket..." class="border border-stone-300 rounded-lg px-2.5 py-2 text-xs w-full font-bold outline-none focus:border-black bg-white text-black shadow-sm">
                                <button onclick="updateManualTracking(${index})" class="bg-blue-600 text-white text-[10px] font-extrabold px-3 py-2.5 rounded-lg hover:bg-blue-700 transition uppercase tracking-widest shadow-sm">UPDATE</button>
                            </div>
                            <p class="text-[9px] text-stone-400 mt-2">Status web pembeli saat ini: <br><span class="font-bold text-black text-xs leading-tight block mt-0.5">${o.latestTracking || 'Belum diisi admin.'}</span></p>
                        </div>
                    `;
                }

                tbody.innerHTML += `
                    <tr class="border-b border-stone-100 hover:bg-cream-50/30 transition-colors">
                        <td class="p-4 align-top font-extrabold text-black">${o.id}<br><span class="text-[9px] text-stone-400 font-bold uppercase tracking-widest">${o.date}</span></td>
                        <td class="p-4 align-top">
                            <p class="font-extrabold text-black">${o.user.name}</p>
                            <p class="text-[10px] font-bold text-stone-500">${o.user.phone}</p>
                        </td>
                        <td class="p-4 align-top">
                            <span class="text-[9px] font-extrabold px-2.5 py-1 rounded-full uppercase tracking-widest border ${badgeClass}">${o.status}</span>
                            ${o.resi ? `<span class="ml-2 text-xs font-extrabold text-black tracking-widest">Resi: ${o.resi}</span>` : ''}
                            ${trackingPanel}
                        </td>
                    </tr>
                `;
            });
        }

        // LOGIKA PENYIMPANAN STATUS MANUAL OLEH ADMIN
        function updateManualTracking(index) {
            const inputVal = document.getElementById(`manualTrack_${index}`).value;
            if(!inputVal) return alert("Ketik dulu status terbarunya!");
            
            // Format waktu otomatis ala sistem
            const now = new Date();
            const timeString = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }) + ", " + now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + " WIB";

            // Simpan ke DB
            ordersDB[index].latestTracking = inputVal;
            ordersDB[index].trackingTime = timeString;
            
            showAdminToast("Status pelacakan web pembeli berhasil diubah!");
            renderOrders();
        }

        renderOrders();
    </script>
</body>
</html>
