<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustipHub - Premium Personal Shopper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <!-- LIVE NOTIFICATION (FOMO TOAST) -->
    <div id="liveToast" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-500 translate-y-[-150%] opacity-0 pointer-events-none w-max max-w-[90vw]">
        <div class="bg-black/90 text-white text-[10px] sm:text-xs font-medium px-4 py-2.5 rounded-full shadow-2xl flex items-center space-x-2 border border-slate-700">
            <div class="h-2 w-2 bg-green-400 rounded-full animate-pulse"></div>
            <span id="toastMsg">Seseorang baru saja membeli item</span>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-lg font-bold tracking-tight">JUSTIP<span class="text-slate-400 font-normal">HUB</span></h1>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="switchTab('dashboard')" class="text-slate-500 hover:text-black transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </button>
                <button onclick="toggleCart()" class="relative text-slate-500 hover:text-black transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <span id="cartCount" class="absolute -top-1.5 -right-1.5 bg-black text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center opacity-0 transition-opacity">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- TAB: SHOP (CATALOG) -->
    <section id="shopTab" class="tab-content active max-w-md mx-auto pb-24">
        
        <div class="px-6 py-6 space-y-4">
            <!-- SEARCH BAR -->
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="text" id="searchInput" placeholder="Cari skincare, sepatu..." class="w-full bg-white border border-slate-200 rounded-2xl pl-10 pr-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-sm">
            </div>

            <!-- FILTER NEGARA & KATEGORI -->
            <div class="flex flex-col space-y-3">
                <div class="flex space-x-2 overflow-x-auto hide-scroll pb-1">
                    <button onclick="setCountry('ALL')" class="country-btn active bg-black text-white px-4 py-1.5 rounded-full text-[11px] font-semibold whitespace-nowrap transition">Semua Negara</button>
                    <button onclick="setCountry('USA')" class="country-btn bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-full text-[11px] font-semibold whitespace-nowrap transition">USA</button>
                    <button onclick="setCountry('JAPAN')" class="country-btn bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-full text-[11px] font-semibold whitespace-nowrap transition">Japan</button>
                    <button onclick="setCountry('KOREA')" class="country-btn bg-white border border-slate-200 text-slate-500 px-4 py-1.5 rounded-full text-[11px] font-semibold whitespace-nowrap transition">Korea</button>
                </div>
                <div class="flex space-x-2 overflow-x-auto hide-scroll pb-1">
                    <button onclick="setCategory('ALL')" class="cat-btn active text-black border-b-2 border-black px-1 py-1 text-[11px] font-bold whitespace-nowrap transition">Semua Kategori</button>
                    <button onclick="setCategory('Skincare')" class="cat-btn text-slate-400 border-b-2 border-transparent px-1 py-1 text-[11px] font-bold whitespace-nowrap transition">Skincare</button>
                    <button onclick="setCategory('Fashion')" class="cat-btn text-slate-400 border-b-2 border-transparent px-1 py-1 text-[11px] font-bold whitespace-nowrap transition">Fashion</button>
                    <button onclick="setCategory('Food')" class="cat-btn text-slate-400 border-b-2 border-transparent px-1 py-1 text-[11px] font-bold whitespace-nowrap transition">Food & Snack</button>
                </div>
            </div>
        </div>

        <!-- PRODUCT GRID -->
        <div id="productGrid" class="grid grid-cols-2 gap-4 px-6">
            <!-- Render via JS -->
        </div>
        
        <!-- Empty State Not Found -->
        <div id="emptyState" class="hidden text-center py-12 px-6">
            <p class="text-slate-400 text-sm">Barang tidak ditemukan. Coba kata kunci lain.</p>
        </div>
    </section>

    <!-- TAB: DASHBOARD (Biarkan sama seperti sebelumnya) -->
    <section id="dashboardTab" class="tab-content max-w-md mx-auto px-6 py-8 pb-24">
        <button onclick="switchTab('shop')" class="text-xs font-bold text-slate-400 mb-6 flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg> BACK TO SHOP
        </button>
        <h2 class="text-2xl font-bold mb-6">Order Tracking</h2>
        <div id="orderList" class="space-y-4">
            <p class="text-center text-slate-400 py-20 text-sm">Belum ada riwayat pesanan.</p>
        </div>
    </section>

    <!-- CART DRAWER (Sama seperti V1, dipotong untuk ringkas, pastikan Anda copy dari versi sebelumnya jika ada yang kurang) -->
    <div id="cartDrawer" class="fixed inset-0 z-[60] invisible pointer-events-none transition-all duration-300">
        <div onclick="toggleCart()" class="absolute inset-0 bg-black/20 backdrop-blur-sm opacity-0 transition-opacity duration-300" id="cartOverlay"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-sm bg-white shadow-2xl translate-x-full transition-transform duration-300 flex flex-col" id="cartBody">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg">Keranjang</h3>
                <button onclick="toggleCart()" class="text-slate-400 hover:text-black">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="cartItems" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
            <div class="p-6 border-t bg-slate-50 space-y-4">
                <button onclick="alert('Lanjut ke form checkout (Logic V1)')" id="checkoutBtn" disabled class="w-full bg-black text-white py-4 rounded-2xl font-bold text-sm disabled:bg-slate-200 disabled:text-slate-400 transition-all active:scale-95">
                    CHECKOUT SEKARANG
                </button>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA PRODUK (Ditambah Kategori, Batch, & Close Order)
        const products = [
            { id: 1, name: "CeraVe Hydrating Cleanser", price: 350000, country: "USA", category: "Skincare", batch: "Batch USA #01", closeDate: "15 Mei 2026", img: "https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&w=300&q=80" },
            { id: 2, name: "COSRX Snail Mucin", price: 220000, country: "KOREA", category: "Skincare", batch: "Batch KOR #02", closeDate: "20 Mei 2026", img: "https://images.unsplash.com/photo-1608248593842-8021c6a1bce4?auto=format&fit=crop&w=300&q=80" },
            { id: 3, name: "Nike Air Force 1", price: 1850000, country: "USA", category: "Fashion", batch: "Batch USA #01", closeDate: "15 Mei 2026", img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?auto=format&fit=crop&w=300&q=80" },
            { id: 4, name: "Tokyo Banana 8pcs", price: 150000, country: "JAPAN", category: "Food", batch: "Batch JPN #05", closeDate: "10 Juni 2026", img: "https://images.unsplash.com/photo-1582293041079-7814c2f12063?auto=format&fit=crop&w=300&q=80" },
            { id: 5, name: "Hada Labo Lotion", price: 180000, country: "JAPAN", category: "Skincare", batch: "Batch JPN #05", closeDate: "10 Juni 2026", img: "https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&w=300&q=80" }
        ];

        // State Filter Dinamis
        let activeCountry = 'ALL';
        let activeCategory = 'ALL';
        let searchQuery = '';

        // UI TAB LOGIC
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + 'Tab').classList.add('active');
            window.scrollTo(0,0);
        }

        // FILTER ACTIONS
        function setCountry(country) {
            activeCountry = country;
            document.querySelectorAll('.country-btn').forEach(btn => {
                btn.classList.remove('bg-black', 'text-white', 'active');
                btn.classList.add('bg-white', 'text-slate-500');
            });
            event.target.classList.add('bg-black', 'text-white', 'active');
            renderProducts();
        }

        function setCategory(category) {
            activeCategory = category;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('text-black', 'border-black', 'active');
                btn.classList.add('text-slate-400', 'border-transparent');
            });
            event.target.classList.remove('text-slate-400', 'border-transparent');
            event.target.classList.add('text-black', 'border-black', 'active');
            renderProducts();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderProducts();
        });

        // CORE RENDER
        function renderProducts() {
            const container = document.getElementById('productGrid');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            // Engine Filter Multiple (Search + Country + Category)
            const filtered = products.filter(p => {
                const matchCountry = activeCountry === 'ALL' || p.country === activeCountry;
                const matchCategory = activeCategory === 'ALL' || p.category === activeCategory;
                const matchSearch = p.name.toLowerCase().includes(searchQuery);
                return matchCountry && matchCategory && matchSearch;
            });

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach(p => {
                    container.innerHTML += `
                        <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-50 group flex flex-col justify-between h-full relative">
                            <div>
                                <div class="relative pb-[100%] bg-slate-100">
                                    <img src="${p.img}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                    <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-[8px] font-bold px-2 py-1 rounded-full uppercase tracking-tighter shadow-sm">${p.country}</span>
                                </div>
                                <div class="p-4 pb-2">
                                    <!-- INFO BATCH & CLOSE ORDER -->
                                    <div class="flex flex-col mb-2 bg-orange-50/50 p-2 rounded-xl border border-orange-100/50">
                                        <span class="text-[9px] font-bold text-orange-600 uppercase tracking-tight">${p.batch}</span>
                                        <span class="text-[9px] text-orange-500 font-medium">Close: ${p.closeDate}</span>
                                    </div>
                                    <p class="text-[9px] text-slate-400 uppercase tracking-widest font-semibold mb-1">${p.category}</p>
                                    <h3 class="text-xs font-semibold text-slate-800 line-clamp-2 leading-tight">${p.name}</h3>
                                </div>
                            </div>
                            <div class="p-4 pt-0">
                                <p class="text-sm font-bold text-black mb-3">Rp ${p.price.toLocaleString()}</p>
                                <button onclick="addToCart(${p.id})" class="w-full bg-slate-50 hover:bg-black hover:text-white transition-all text-black text-[10px] font-bold py-2.5 rounded-xl active:scale-95">TITIP SEKARANG</button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // FAKE LIVE NOTIFICATION (SOCIAL PROOF) LOGIC
        const fakeBuyers = ["Nisa", "Budi", "Sinta", "Andika", "Reza", "Putri", "Dadan", "Yasmine"];
        
        function showFakeNotification() {
            // Pilih nama dan produk acak
            const randomBuyer = fakeBuyers[Math.floor(Math.random() * fakeBuyers.length)];
            const randomProduct = products[Math.floor(Math.random() * products.length)].name;
            
            const toast = document.getElementById('liveToast');
            const msg = document.getElementById('toastMsg');
            
            msg.innerHTML = `<span class="font-bold">${randomBuyer}</span> memesan <span class="text-slate-300">${randomProduct}</span>`;
            
            // Tampilkan animasi masuk
            toast.classList.remove('translate-y-[-150%]', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            // Sembunyikan setelah 3.5 detik
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-[-150%]', 'opacity-0');
            }, 3500);
        }

        // Jalankan notifikasi pertama setelah 5 detik web dibuka, lalu ulang tiap 12-20 detik secara acak
        setTimeout(() => {
            showFakeNotification();
            setInterval(showFakeNotification, Math.floor(Math.random() * (20000 - 12000 + 1) + 12000));
        }, 5000);

        // INIT CART DUMMY & RENDER
        let cart = [];
        function addToCart(id) {
            cart.push(id);
            document.getElementById('cartCount').textContent = cart.length;
            document.getElementById('cartCount').style.opacity = '1';
            document.getElementById('checkoutBtn').disabled = false;
        }
        function toggleCart() {
            const drawer = document.getElementById('cartDrawer');
            if(drawer.classList.contains('invisible')) {
                drawer.classList.remove('invisible');
                drawer.classList.add('pointer-events-auto');
            } else {
                drawer.classList.add('invisible');
                drawer.classList.remove('pointer-events-auto');
            }
        }

        renderProducts();
    </script>
</body>
</html>
